<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Israel City Quiz</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { height: 100%; overflow: hidden; max-width: 100%; }
    body {
      font-family: Arial, sans-serif;
      display: flex; flex-direction: column;
      height: 100dvh; /* dynamic viewport height — shrinks/grows with browser chrome */
      overflow: hidden;
    }

    #header {
      background: #2c3e6b;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 64px;
      flex-shrink: 0;
      z-index: 1000;
    }

    #score-display { font-size: 15px; min-width: 110px; }

    .toggle-row {
      display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; user-select: none;
    }
    .toggle-track {
      width: 40px; height: 22px; background: #556; border-radius: 11px;
      position: relative; transition: background 0.2s; cursor: pointer; flex-shrink: 0;
    }
    .toggle-track.on { background: #4a90d9; }
    .toggle-thumb {
      position: absolute; top: 3px; left: 3px;
      width: 16px; height: 16px; background: white; border-radius: 50%;
      transition: left 0.2s;
    }
    .toggle-track.on .toggle-thumb { left: 21px; }
    #toggles { display: flex; flex-direction: column; gap: 6px; }

    #prompt-area { display: flex; align-items: center; gap: 10px; font-size: 16px; }

    #city-badge {
      background: white;
      color: #1a2a50;
      padding: 6px 18px;
      border-radius: 22px;
      font-weight: bold;
      font-size: 17px;
      text-align: center;
      line-height: 1.3;
    }
    #city-name-he { display: block; font-size: 12px; font-weight: normal; color: #555; }

    #skip-btn {
      background: none; border: none; color: white;
      cursor: pointer; font-size: 20px; padding: 4px 8px;
      opacity: 0.8;
    }
    #skip-btn:hover { opacity: 1; }

    #timer-display { font-size: 16px; min-width: 60px; text-align: right; }

    #map { flex: 1; min-height: 0; overflow: hidden; }

    #overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    #overlay.visible { display: flex; }

    #overlay-box {
      background: #2c3e6b;
      color: white;
      padding: 40px 50px;
      border-radius: 14px;
      text-align: center;
      min-width: 300px;
    }
    #overlay-box h2 { font-size: 28px; margin-bottom: 16px; }
    #overlay-box p { font-size: 18px; margin-bottom: 24px; }
    #overlay-box button {
      background: white; color: #2c3e6b;
      border: none; padding: 10px 28px;
      border-radius: 20px; font-size: 16px;
      font-weight: bold; cursor: pointer;
    }
    #overlay-box button:hover { background: #eee; }

  @media (max-width: 480px) {
    #header { padding: 0 10px; }
    #score-display { font-size: 13px; min-width: 80px; }
    #timer-display { font-size: 13px; min-width: 50px; }
    .toggle-row span { display: none; }
    #toggles { gap: 4px; }
    .toggle-track { width: 34px; height: 20px; border-radius: 10px; }
    .toggle-thumb { width: 14px; height: 14px; }
    .toggle-track.on .toggle-thumb { left: 17px; }
    #city-badge { font-size: 14px; padding: 5px 12px; }
    #city-name-he { font-size: 11px; }
    #prompt-area > span { display: none; }
  }
  </style>
</head>
<body>

<div id="header">

  <div id="toggles">

      <div class="toggle-track" id="diff-track"><div class="toggle-thumb"></div></div>

    </div>

  </div>
  <div id="prompt-area">

</div>

  subdomains: 'abcd'
}).addTo(map);

// ── Helpers ────────────────────────────────────────────────────────────────
function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371, toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function nearestCity(lat, lon) {
  return CITIES.reduce((best, city) => {
    const d = haversineKm(lat, lon, city.lat, city.lon);
    return d < best.dist ? { city, dist: d } : best;
  }, { city: null, dist: Infinity }).city;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pad(n) { return String(n).padStart(2, '0'); }

  'Tel Aviv','Jerusalem','Haifa','Beersheba','Eilat',
  'Netanya','Rishon LeZion','Petah Tikva','Ashdod','Ashkelon',
  'Rehovot','Holon','Bnei Brak','Bat Yam','Ramat Gan',

  'Tiberias','Safed','Kiryat Shmona','Nazareth','Dimona'
]);

// ── Game state ─────────────────────────────────────────────────────────────
let queue, currentIdx, attempts, score, timerInterval, elapsedSec;
let easyMode = false;
let showPoints = false;
const markers = {};      // cityName -> answered L.circleMarker
const ghostMarkers = {}; // cityName -> unanswered ghost L.circleMarker

// Color by attempt number (0-indexed: attempt 0 = first try)
const ATTEMPT_COLORS = ['#ffffff', '#f5d060', '#f5a020', '#e8662a', '#e74c3c'];
const FAILED_COLOR = '#cccccc';
const MAX_ATTEMPTS = 5;

function renderGhosts() {
  // Remove existing ghosts
  Object.values(ghostMarkers).forEach(m => map.removeLayer(m));
  Object.keys(ghostMarkers).forEach(k => delete ghostMarkers[k]);
  if (!showPoints) return;
  // Add ghost for every city in queue that hasn't been answered yet
  queue.slice(currentIdx).forEach(city => {
    if (markers[city.name_en]) return; // already answered
    const m = L.circleMarker([city.lat, city.lon], {
      radius: 5, color: '#888', weight: 1.2,
      fillColor: 'white', fillOpacity: 0.15
    }).addTo(map);
    ghostMarkers[city.name_en] = m;
  });
}

function startGame() {
  // Clear old markers
  Object.values(markers).forEach(m => map.removeLayer(m));
  Object.keys(markers).forEach(k => delete markers[k]);
  Object.values(ghostMarkers).forEach(m => map.removeLayer(m));
  Object.keys(ghostMarkers).forEach(k => delete ghostMarkers[k]);

  const pool = easyMode ? CITIES.filter(c => EASY_CITIES.has(c.name_en)) : CITIES;
  queue = shuffle(pool);
  currentIdx = 0;
  score = { first: 0, second: 0, other: 0, failed: 0 };
  elapsedSec = 0;
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    elapsedSec++;
    document.getElementById('timer-display').textContent =
      pad(Math.floor(elapsedSec / 60)) + ':' + pad(elapsedSec % 60);
  }, 1000);

  document.getElementById('overlay').classList.remove('visible');
  loadQuestion();
  renderGhosts();
}

function loadQuestion() {
  if (currentIdx >= queue.length) { endGame(); return; }
  attempts = 0;
  const city = queue[currentIdx];
  document.getElementById('city-name-en').textContent = city.name_en;
  document.getElementById('city-name-he').textContent = city.name_he;
  updateScoreDisplay();
}

function updateScoreDisplay() {
  const answered = score.first + score.second + score.failed;
  const pct = answered === 0 ? 0 : Math.round((score.first + score.second) / answered * 100);
  document.getElementById('score-display').textContent =
    answered + ' / ' + queue.length + ' | ' + pct + '%';
}

function placeMarker(city, color, radius = 10) {
  if (ghostMarkers[city.name_en]) {
    map.removeLayer(ghostMarkers[city.name_en]);
    delete ghostMarkers[city.name_en];
  }
  if (markers[city.name_en]) map.removeLayer(markers[city.name_en]);
  const m = L.circleMarker([city.lat, city.lon], {
    radius,
    color: '#333',
    weight: 1.5,
    fillColor: color,
    fillOpacity: 0.95
  }).addTo(map);
  m.bindTooltip(city.name_en, { permanent: false });
  markers[city.name_en] = m;
  return m;
}

function showDistance(lat, lon, distKm) {
  const label = distKm < 1
    ? '< 1 km'
    : Math.round(distKm) + ' km away';
  const popup = L.popup({ closeButton: false, autoClose: false, className: 'dist-popup' })
    .setLatLng([lat, lon])
    .setContent(label)
    .openOn(map);
  setTimeout(() => map.closePopup(popup), 1500);
}

function flashWrong(lat, lon) {
  const m = L.circleMarker([lat, lon], {
    radius: 8, color: '#e74c3c', weight: 2,
    fillColor: '#e74c3c', fillOpacity: 0.8
  }).addTo(map);
  setTimeout(() => map.removeLayer(m), 600);
}

function advance() {
  currentIdx++;
  setTimeout(loadQuestion, 400);
}

function skip() {
  const city = queue[currentIdx];
  score.failed++;
  placeMarker(city, COLORS.failed);
  advance();
}

// ── Click handler ──────────────────────────────────────────────────────────
map.on('click', function(e) {
  if (currentIdx >= queue.length) return;
  const { lat, lng } = e.latlng;
  const target = queue[currentIdx];
  const clicked = nearestCity(lat, lng);

  if (clicked.name_en === target.name_en) {
    // Correct
    const color = ATTEMPT_COLORS[Math.min(attempts, ATTEMPT_COLORS.length - 1)];
    if (attempts === 0) score.first++;
    else if (attempts === 1) score.second++;
    else score.other++;
    placeMarker(target, color, 10);
    advance();
  } else {
    // Wrong — show distance and flash
    const dist = haversineKm(lat, lng, target.lat, target.lon);
    flashWrong(lat, lng);
    showDistance(lat, lng, dist);
    attempts++;
    if (attempts >= MAX_ATTEMPTS) {
      score.failed++;
      const m = placeMarker(target, '#e74c3c', 12);
      setTimeout(() => {
        map.removeLayer(m);
        placeMarker(target, FAILED_COLOR, 10);
      }, 700);
      advance();
    }
  }
  updateScoreDisplay();
});

document.getElementById('skip-btn').addEventListener('click', skip);

// ── Toggles ────────────────────────────────────────────────────────────────
document.getElementById('difficulty-toggle').addEventListener('click', () => {
  easyMode = !easyMode;
  document.getElementById('diff-track').classList.toggle('on', easyMode);
  startGame();
});

document.getElementById('points-toggle').addEventListener('click', () => {
  showPoints = !showPoints;
  document.getElementById('points-track').classList.toggle('on', showPoints);
  renderGhosts();
});

// ── End game ───────────────────────────────────────────────────────────────
function endGame() {
  clearInterval(timerInterval);
  const total = queue.length;
  const correct = score.first + score.second;
  const pct = Math.round(correct / total * 100);
  document.getElementById('final-score').textContent =
    correct + ' / ' + total + ' correct (' + pct + '%) — ' +
    score.first + ' on 1st try, ' + score.second + ' on 2nd, ' +
    score.other + ' on 3rd–5th, ' + score.failed + ' missed';
  document.getElementById('overlay').classList.add('visible');
}

// ── Start ──────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => map.invalidateSize());
startGame();
</script>
